asyncapi: 3.1.0
info:
  title: ConsumerImportService — producer side
  version: 1.0.0
  description: |
    Half of the v0.5 cross-file message-ref fixture. This spec is the
    producer: it generates the OrderMessage type (in its own
    package) and a Publisher that sends it. The consumer-view spec in
    ../consumer/ references this spec's OrderMessage via a cross-file
    $ref and emits a Subscriber typed against the imported type.

defaultContentType: application/json

channels:
  orderDispatch:
    address: '{tenant}.orders'
    parameters:
      tenant: { description: Tenant identifier. }
    bindings:
      amqp:
        is: routingKey
        exchange:
          name: OrderExchange
          type: direct
        bindingVersion: 0.3.0
    messages:
      OrderMessage:
        name: OrderMessage
        contentType: application/json
        payload:
          type: object
          required: [id, sku]
          additionalProperties: false
          properties:
            id:  { type: string }
            sku: { type: string }
            qty: { type: integer, minimum: 1 }

operations:
  sendOrder:
    action: send
    channel: { $ref: '#/channels/orderDispatch' }
    messages:
      - $ref: '#/channels/orderDispatch/messages/OrderMessage'
